name: Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'book/requirements.txt'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r book/requirements.txt

      - name: Convert MyST markdown to notebooks
        run: |
          mkdir -p book/notebooks
          # Convert MyST markdown files to notebooks
          for dir in project_1 project_2 stats research compilers ai; do
            for f in book/$dir/*.md; do
              if [ -f "$f" ] && grep -q "jupytext:" "$f" 2>/dev/null; then
                filename=$(basename "$f" .md)
                jupytext --to notebook "$f" -o "book/notebooks/${filename}.ipynb"
              fi
            done
          done

      - name: Build Jupyter Book
        run: |
          jupyter-book build book/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
